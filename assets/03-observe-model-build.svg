<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Observe, Model, Build system map</title>
  <desc id="desc">A three-panel system map describing Observe, Model, and Build with keywords: experiments, movement, perception; spatial reasoning, cognitive models, computer vision, geospatial systems; interfaces, dashboards, full-stack tools, reproducible research systems.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#064E3B"/>
      <stop offset="0.52" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>

    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0.84"/>
    </linearGradient>

    <linearGradient id="signal" x1="180" y1="90" x2="1020" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#047857" stop-opacity="0.28"/>
      <stop offset="0.52" stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="26" fill="url(#bg)" opacity="0.98"/>

  <g opacity="0.16" stroke="#22D3EE" stroke-width="1">
    <path d="M760 0 V280"/>
    <path d="M860 0 V280"/>
    <path d="M960 0 V280"/>
    <path d="M1060 0 V280"/>
    <path d="M1160 0 V280"/>
    <path d="M720 56 H1200"/>
    <path d="M720 120 H1200"/>
    <path d="M720 184 H1200"/>
    <path d="M720 248 H1200"/>
  </g>

  <text x="72" y="56" fill="#D1FAE5" font-size="14" font-weight="700" letter-spacing="0.18em" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">SYSTEM MAP</text>

  <path d="M180 90 H1020" stroke="url(#signal)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <g filter="url(#glow)">
    <circle cx="180" cy="90" r="6" fill="#22D3EE"/>
    <circle cx="600" cy="90" r="7" fill="#F59E0B"/>
    <circle cx="1020" cy="90" r="6" fill="#22D3EE"/>
  </g>

  <rect x="60" y="118" width="340" height="140" rx="18" fill="url(#card)" stroke="#047857" stroke-opacity="0.35"/>
  <rect x="430" y="118" width="340" height="140" rx="18" fill="url(#card)" stroke="#0891B2" stroke-opacity="0.35"/>
  <rect x="800" y="118" width="340" height="140" rx="18" fill="url(#card)" stroke="#F59E0B" stroke-opacity="0.25"/>

  <text x="88" y="154" fill="#22D3EE" font-size="18" font-weight="900" letter-spacing="0.14em" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">OBSERVE</text>
  <text x="458" y="154" fill="#F59E0B" font-size="18" font-weight="900" letter-spacing="0.14em" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">MODEL</text>
  <text x="828" y="154" fill="#22D3EE" font-size="18" font-weight="900" letter-spacing="0.14em" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">BUILD</text>

  <text x="88" y="178" fill="#D1FAE5" opacity="0.92" font-size="14" font-weight="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    Behaviour • experiments • movement • perception • field data
  </text>

  <text x="458" y="178" fill="#D1FAE5" opacity="0.92" font-size="14" font-weight="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    Spatial reasoning • cognitive models • CV • geospatial systems
  </text>

  <text x="828" y="178" fill="#D1FAE5" opacity="0.92" font-size="14" font-weight="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    Interfaces • dashboards • full-stack tools • reproducible research
  </text>

  <g opacity="0.30" stroke="#D1FAE5" stroke-width="1">
    <path d="M110 208 C160 188 220 232 270 210 S360 204 400 216"/>
    <path d="M480 214 C540 190 610 238 670 214 S730 206 760 220"/>
    <path d="M850 214 C910 188 980 240 1040 214 S1110 204 1140 220"/>
  </g>
</svg>
