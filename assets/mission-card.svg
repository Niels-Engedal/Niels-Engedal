<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mission card</title>
  <desc id="desc">A dark, map-like mission card: From messy reality to useful systems. Includes a simple Observe, Model, Build spine.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#064E3B"/>
      <stop offset="0.52" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>

    <linearGradient id="panel" x1="120" y1="34" x2="1080" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1120" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0.86"/>
    </linearGradient>

    <linearGradient id="signal" x1="260" y1="152" x2="940" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#047857" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="220" rx="26" fill="url(#bg)" opacity="0.98"/>

  <g opacity="0.14" stroke="#22D3EE" stroke-width="1">
    <path d="M740 0 V220"/>
    <path d="M820 0 V220"/>
    <path d="M900 0 V220"/>
    <path d="M980 0 V220"/>
    <path d="M1060 0 V220"/>
    <path d="M1140 0 V220"/>
    <path d="M700 40 H1200"/>
    <path d="M700 110 H1200"/>
    <path d="M700 180 H1200"/>
  </g>

  <g opacity="0.10" stroke="#D1FAE5" stroke-width="1">
    <path d="M0 58 C170 34 270 78 390 54 S610 38 740 62 S1000 104 1200 44"/>
    <path d="M0 108 C160 90 290 132 420 110 S640 92 780 120 S1030 160 1200 104"/>
    <path d="M0 166 C190 142 300 198 430 168 S700 146 840 176 S1060 212 1200 156"/>
  </g>

  <rect x="60" y="34" width="1080" height="152" rx="20" fill="url(#panel)" stroke="#047857" stroke-opacity="0.35"/>

  <text x="92" y="68" fill="#D1FAE5" font-size="14" font-weight="700" letter-spacing="0.18em" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    FIELD NOTE / MISSION
  </text>

  <text x="92" y="108" fill="#D1FAE5" font-size="34" font-weight="800" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    From messy reality to useful systems
  </text>

  <text x="92" y="138" fill="#D1FAE5" opacity="0.9" font-size="16" font-weight="500" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    I build human-centered systems that turn real-world behaviour into data, models, and tools.
  </text>

  <path d="M260 152 H940" stroke="url(#signal)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <g filter="url(#glow)">
    <circle cx="260" cy="152" r="6" fill="#22D3EE"/>
    <circle cx="600" cy="152" r="7" fill="#F59E0B"/>
    <circle cx="940" cy="152" r="6" fill="#22D3EE"/>
  </g>

  <text x="240" y="178" fill="#22D3EE" opacity="0.95" font-size="12" font-weight="800" letter-spacing="0.16em" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">OBSERVE</text>
  <text x="586" y="178" fill="#F59E0B" opacity="0.95" font-size="12" font-weight="800" letter-spacing="0.16em" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">MODEL</text>
  <text x="922" y="178" fill="#22D3EE" opacity="0.95" font-size="12" font-weight="800" letter-spacing="0.16em" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">BUILD</text>
</svg>
