<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Design principles</title>
  <desc id="desc">A map-like design principles panel with four coordinate markers: reproducible, visual, modular, practical.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#064E3B"/>
      <stop offset="0.52" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>

    <linearGradient id="panel" x1="60" y1="56" x2="1140" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1120" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0.86"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" rx="26" fill="url(#bg)" opacity="0.98"/>

  <g opacity="0.16" stroke="#22D3EE" stroke-width="1">
    <path d="M760 0 V260"/>
    <path d="M860 0 V260"/>
    <path d="M960 0 V260"/>
    <path d="M1060 0 V260"/>
    <path d="M1160 0 V260"/>
    <path d="M720 60 H1200"/>
    <path d="M720 124 H1200"/>
    <path d="M720 188 H1200"/>
    <path d="M720 252 H1200"/>
  </g>

  <rect x="60" y="56" width="1080" height="180" rx="20" fill="url(#panel)" stroke="#047857" stroke-opacity="0.35"/>

  <text x="92" y="92" fill="#D1FAE5" font-size="14" font-weight="700" letter-spacing="0.18em" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    DESIGN PRINCIPLES
  </text>

  <g opacity="0.18" stroke="#D1FAE5" stroke-width="1">
    <path d="M120 118 H1080"/>
    <path d="M120 190 H1080"/>
    <path d="M360 106 V214"/>
    <path d="M840 106 V214"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="240" cy="154" r="7" fill="#22D3EE"/>
    <circle cx="600" cy="128" r="7" fill="#F59E0B"/>
    <circle cx="600" cy="200" r="7" fill="#22D3EE"/>
    <circle cx="960" cy="154" r="7" fill="#F59E0B"/>
  </g>

  <text x="270" y="150" fill="#D1FAE5" font-size="16" font-weight="850" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Reproducible</text>
  <text x="270" y="172" fill="#D1FAE5" opacity="0.88" font-size="13" font-weight="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Enough to rerun later</text>

  <text x="630" y="124" fill="#D1FAE5" font-size="16" font-weight="850" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Visual</text>
  <text x="630" y="146" fill="#D1FAE5" opacity="0.88" font-size="13" font-weight="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Enough to explain clearly</text>

  <text x="630" y="196" fill="#D1FAE5" font-size="16" font-weight="850" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Modular</text>
  <text x="630" y="218" fill="#D1FAE5" opacity="0.88" font-size="13" font-weight="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Enough to grow</text>

  <text x="990" y="150" fill="#D1FAE5" font-size="16" font-weight="850" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Practical</text>
  <text x="990" y="172" fill="#D1FAE5" opacity="0.88" font-size="13" font-weight="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">Enough to use</text>
</svg>
