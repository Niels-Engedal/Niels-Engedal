<svg width="1600" height="2925" viewBox="0 0 1600 2925" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Niels Engedal — From messy reality to useful systems</title>
  <desc id="desc">A single continuous profile page for Niels Engedal, a Cognitive Science student building human-centered data systems for messy real-world behaviour.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="2925" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="0.22" stop-color="#064E3B"/>
      <stop offset="0.58" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0.86"/>
    </linearGradient>

    <linearGradient id="signal" x1="240" y1="0" x2="1360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#047857" stop-opacity="0.25"/>
      <stop offset="0.55" stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.9"/>
    </linearGradient>

    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="#22D3EE" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="nameReveal">
      <rect x="168" y="105" width="0" height="150">
        <animate
          attributeName="width"
          from="0"
          to="880"
          dur="2.1s"
          begin="0.25s"
          fill="freeze" />
      </rect>
    </clipPath>

    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .sans {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }

      .h1 {
        fill: #D1FAE5;
        font-size: 124px;
        font-weight: 920;
      }

      .h2 {
        fill: #D1FAE5;
        font-size: 64px;
        font-weight: 880;
      }

      .h3 {
        fill: #D1FAE5;
        font-size: 40px;
        font-weight: 860;
      }

      .body {
        fill: #D1FAE5;
        opacity: 0.92;
        font-size: 32px;
        font-weight: 620;
      }

      .small {
        fill: #D1FAE5;
        opacity: 0.88;
        font-size: 26px;
        font-weight: 580;
      }

      .cardText {
        fill: #D1FAE5;
        opacity: 0.88;
        font-size: 24px;
        font-weight: 620;
      }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="1600" height="2925" fill="url(#bg)"/>

  <!-- Right-side grid overlay -->
  <g opacity="0.9">
    <rect x="860" y="0" width="740" height="2925" fill="url(#grid)"/>
  </g>

  <!-- Soft topographic contours -->
  <g opacity="0.10" stroke="#D1FAE5" stroke-width="1">
    <path d="M0 360 C220 280 390 440 610 350 S980 260 1200 400 S1420 500 1600 320"/>
    <path d="M0 650 C240 540 420 720 650 630 S980 530 1200 690 S1420 820 1600 580"/>
    <path d="M0 1030 C230 930 460 1150 700 1040 S980 890 1200 1070 S1420 1250 1600 970"/>
    <path d="M0 1440 C250 1340 480 1560 740 1445 S1040 1260 1240 1480 S1460 1700 1600 1360"/>
    <path d="M0 1870 C260 1750 520 2030 780 1910 S1080 1670 1280 1930 S1460 2190 1600 1750"/>
    <path d="M0 2330 C280 2210 560 2570 820 2370 S1120 2110 1320 2410 S1480 2770 1600 2270"/>
    <path d="M0 2860 C300 2720 600 3160 880 2880 S1180 2560 1360 2940 S1500 3380 1600 2760"/>
  </g>

  <!-- Animated signal spine -->
  <g id="signal-spine" opacity="1">
    <path
      d="M1400 190 C1328 340 1480 500 1400 625 C1320 820 1480 990 1400 1095 C1320 1280 1480 1510 1400 1715 C1320 1940 1480 2150 1400 2255 C1320 2480 1475 2700 1400 2870"
      stroke="url(#signal)"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"/>

    <path
      d="M1400 190 C1328 340 1480 500 1400 625 C1320 820 1480 990 1400 1095 C1320 1280 1480 1510 1400 1715 C1320 1940 1480 2150 1400 2255 C1320 2480 1475 2700 1400 2870"
      stroke="#F59E0B"
      stroke-width="2"
      stroke-dasharray="14 18"
      stroke-linecap="round"
      opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="0" to="-128" dur="7s" repeatCount="indefinite"/>
    </path>

    <g filter="url(#glow)">
      <circle cx="1400" cy="190" r="8" fill="#22D3EE"/>
      <circle cx="1400" cy="625" r="8" fill="#F59E0B"/>
      <circle cx="1400" cy="1095" r="9" fill="#22D3EE"/>
      <circle cx="1400" cy="1715" r="9" fill="#F59E0B"/>
      <circle cx="1400" cy="2255" r="9" fill="#22D3EE"/>
      <circle cx="1400" cy="2870" r="9" fill="#F59E0B"/>
    </g>
  </g>

  <!-- HERO -->
  <g id="hero">
    <rect x="120" y="70" width="1360" height="515" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.35"/>

    <text x="168" y="225" class="sans h1" clip-path="url(#nameReveal)">Hi, I’m Niels</text>

    <rect x="168" y="112" width="4" height="122" rx="2" fill="#D1FAE5">
      <animate attributeName="x" from="168" to="850" dur="1.6s" begin="0.25s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;1;0" keyTimes="0;0.86;0.95;1" dur="2.1s" begin="0.25s" fill="freeze"/>
    </rect>

    <text x="168" y="330" class="sans body">
      <tspan x="168" dy="0">Cognitive Science student building human-centered data systems</tspan>
      <tspan x="168" dy="42">for messy real-world behaviour.</tspan>
    </text>

    <path
      d="M240 485 C420 415 560 565 720 485 C920 375 1040 585 1200 485"
      stroke="url(#signal)"
      stroke-width="4"
      stroke-linecap="round"
      opacity="0.85"/>

    <path
      d="M240 485 C420 415 560 565 720 485 C920 375 1040 585 1200 485"
      stroke="#F59E0B"
      stroke-width="2"
      stroke-dasharray="10 14"
      stroke-linecap="round"
      opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="0" to="-96" dur="6s" repeatCount="indefinite"/>
    </path>

    <g filter="url(#glow)">
      <circle cx="240" cy="485" r="7" fill="#22D3EE"/>
      <circle cx="720" cy="485" r="7" fill="#22D3EE"/>
      <circle cx="1200" cy="485" r="8" fill="#F59E0B"/>
    </g>

    <g opacity="0.35">
      <path d="M160 520 C300 446 420 474 560 439 C680 406 760 356 900 384 C1040 412 1140 484 1280 446 C1380 420 1450 434 1480 454 L1480 575 L160 575 Z" fill="#064E3B"/>
      <path d="M160 550 C320 490 470 540 610 492 C760 444 860 396 980 424 C1120 454 1230 520 1360 490 C1420 478 1465 482 1480 486 L1480 575 L160 575 Z" fill="#047857" opacity="0.65"/>
    </g>
  </g>

  <!-- HUMAN × MACHINE -->
  <g id="human-machine">
    <rect x="120" y="625" width="1360" height="430" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.30"/>

    <text x="168" y="740" class="sans h2">Bridging judgement and scale</text>
    <text x="168" y="795" class="sans small">Not replacing humans with automation, but designing bridges instead.</text>

    <rect x="168" y="850" width="620" height="160" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.25"/>
    <rect x="860" y="850" width="520" height="160" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.20"/>

    <text x="210" y="900" class="mono" fill="#22D3EE" font-size="26" font-weight="950" letter-spacing="0.14em">HUMANS</text>
    <text x="900" y="900" class="mono" fill="#F59E0B" font-size="26" font-weight="950" letter-spacing="0.14em">MACHINES</text>

    <g class="sans" fill="#D1FAE5" opacity="0.9" font-size="26" font-weight="660">
      <text x="210" y="949">Context • Meaning • Judgement</text>
      <text x="210" y="987">Creativity • Goals • Trade-offs</text>

      <text x="900" y="949">Scale • Memory • Patterns</text>
      <text x="900" y="987">Repetition • Computation</text>
    </g>

    <path d="M230 1025 H1340" stroke="url(#signal)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

    <g filter="url(#glow)">
      <circle cx="410" cy="1025" r="6" fill="#22D3EE"/>
      <circle cx="784" cy="1025" r="7" fill="#F59E0B"/>
      <circle cx="1140" cy="1025" r="6" fill="#22D3EE"/>
    </g>
  </g>

  <!-- OBSERVE → MODEL → BUILD -->
  <g id="observe-model-build">
    <rect x="120" y="1095" width="1360" height="580" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.32"/>

    <text x="168" y="1205" class="sans h2">What I do</text>

    <path d="M260 1270 H1260" stroke="url(#signal)" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

    <g filter="url(#glow)">
      <circle cx="260" cy="1270" r="7" fill="#22D3EE"/>
      <circle cx="760" cy="1270" r="8" fill="#F59E0B"/>
      <circle cx="1260" cy="1270" r="7" fill="#22D3EE"/>
    </g>

    <rect x="168" y="1333" width="410" height="292" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.22"/>
    <rect x="595" y="1333" width="410" height="292" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="1022" y="1333" width="410" height="292" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.22"/>

    <text x="200" y="1397" class="mono" fill="#22D3EE" font-size="28" font-weight="950" letter-spacing="0.14em">OBSERVE</text>
    <text x="627" y="1397" class="mono" fill="#F59E0B" font-size="28" font-weight="950" letter-spacing="0.14em">MODEL</text>
    <text x="1054" y="1397" class="mono" fill="#22D3EE" font-size="28" font-weight="950" letter-spacing="0.14em">BUILD</text>

    <text x="200" y="1445" class="sans" fill="#D1FAE5" font-size="30" font-weight="720">Turn behaviour</text>
    <text x="200" y="1483" class="sans" fill="#D1FAE5" font-size="30" font-weight="720">into data</text>

    <text x="627" y="1445" class="sans" fill="#D1FAE5" font-size="30" font-weight="720">Turn data</text>
    <text x="627" y="1483" class="sans" fill="#D1FAE5" font-size="30" font-weight="720">into structure</text>

    <text x="1054" y="1445" class="sans" fill="#D1FAE5" font-size="30" font-weight="720">Turn structure</text>
    <text x="1054" y="1483" class="sans" fill="#D1FAE5" font-size="30" font-weight="720">into tools</text>

    <g class="sans cardText">
      <text x="200" y="1545">
        <tspan x="200" dy="0">Experiments • movement</tspan>
        <tspan x="200" dy="31">Perception • field data</tspan>
      </text>

      <text x="627" y="1545">
        <tspan x="627" dy="0">Spatial reasoning</tspan>
        <tspan x="627" dy="31">Cognitive models</tspan>
        <tspan x="627" dy="31">CV • geospatial systems</tspan>
      </text>

      <text x="1054" y="1545">
        <tspan x="1054" dy="0">Interfaces • dashboards</tspan>
        <tspan x="1054" dy="31">Full-stack tools</tspan>
        <tspan x="1054" dy="31">Research systems</tspan>
      </text>
    </g>
  </g>

  <!-- TERRAIN -->
  <g id="terrain">
    <rect x="120" y="1715" width="1360" height="500" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>

    <text x="168" y="1825" class="sans h2">Where I like working</text>

    <rect x="168" y="1875" width="632" height="120" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>
    <rect x="848" y="1875" width="584" height="120" rx="22" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.28"/>
    <rect x="168" y="2015" width="632" height="120" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="848" y="2015" width="584" height="120" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.22"/>

    <g filter="url(#glow)">
      <circle cx="208" cy="1935" r="7" fill="#22D3EE"/>
      <circle cx="888" cy="1935" r="7" fill="#F59E0B"/>
      <circle cx="208" cy="2075" r="7" fill="#F59E0B"/>
      <circle cx="888" cy="2075" r="7" fill="#22D3EE"/>
    </g>

    <text x="238" y="1923" class="sans h3">Experimental systems</text>
    <text x="238" y="1958" class="sans cardText">
      <tspan x="238" dy="0">Browser-based tasks • cognitive testing</tspan>
      <tspan x="238" dy="30">Research workflows</tspan>
    </text>

    <text x="918" y="1923" class="sans h3">Spatial intelligence</text>
    <text x="918" y="1958" class="sans cardText">
      <tspan x="918" dy="0">Movement • reachability</tspan>
      <tspan x="918" dy="30">Geospatial reasoning</tspan>
    </text>

    <text x="238" y="2063" class="sans h3">Applied perception</text>
    <text x="238" y="2098" class="sans cardText">
      <tspan x="238" dy="0">Computer vision • object detection</tspan>
      <tspan x="238" dy="30">Real-world layouts</tspan>
    </text>

    <text x="918" y="2063" class="sans h3">Human-facing tools</text>
    <text x="918" y="2098" class="sans cardText">
      <tspan x="918" dy="0">Dashboards • visual explanations</tspan>
      <tspan x="918" dy="30">Full-stack prototypes</tspan>
    </text>
  </g>

  <!-- TOOLBELT -->
  <g id="toolbelt">
    <rect x="120" y="2255" width="1360" height="470" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.26"/>

    <text x="168" y="2365" class="sans h2">Toolbelt</text>

    <rect x="168" y="2420" width="632" height="105" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>
    <rect x="848" y="2420" width="584" height="105" rx="22" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.28"/>
    <rect x="168" y="2537" width="632" height="105" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="848" y="2537" width="584" height="105" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.22"/>

    <g filter="url(#glow)">
      <circle cx="208" cy="2474" r="7" fill="#22D3EE"/>
      <circle cx="888" cy="2474" r="7" fill="#F59E0B"/>
      <circle cx="208" cy="2591" r="7" fill="#F59E0B"/>
      <circle cx="888" cy="2591" r="7" fill="#22D3EE"/>
    </g>

    <text x="238" y="2475" class="sans h3">Analysis &amp; modelling</text>
    <text x="238" y="2510" class="sans cardText">Python • R • pandas • GeoPandas • PyTorch</text>

    <text x="918" y="2475" class="sans h3">Web systems</text>
    <text x="918" y="2510" class="sans cardText">TypeScript • React • Next.js • Tailwind</text>

    <text x="238" y="2592" class="sans h3">Data &amp; infrastructure</text>
    <text x="238" y="2627" class="sans cardText">PostgreSQL • Docker • Prisma • S3 storage</text>

    <text x="918" y="2592" class="sans h3">Design &amp; communication</text>
    <text x="918" y="2627" class="sans cardText">Markdown • Mermaid • Photoshop</text>
  </g>
</svg>