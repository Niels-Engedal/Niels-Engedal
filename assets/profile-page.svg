<svg width="1600" height="4800" viewBox="0 0 1600 4800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Niels Engedal — From messy reality to useful systems</title>
  <desc id="desc">A single continuous profile page. Sections: hero, manifesto, human × machine philosophy, observe model build spine, terrain, toolbelt, design principles, closing line.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="4800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="0.22" stop-color="#064E3B"/>
      <stop offset="0.58" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0.86"/>
    </linearGradient>

    <linearGradient id="signal" x1="240" y1="0" x2="1360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#047857" stop-opacity="0.25"/>
      <stop offset="0.55" stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.9"/>
    </linearGradient>

    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="#22D3EE" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .label { fill: #D1FAE5; opacity: 0.92; font-weight: 800; letter-spacing: 0.18em; font-size: 14px; }
      .h1 { fill: #D1FAE5; font-weight: 900; font-size: 64px; }
      .h2 { fill: #D1FAE5; font-weight: 850; font-size: 30px; }
      .h3 { fill: #D1FAE5; font-weight: 850; font-size: 18px; }
      .body { fill: #D1FAE5; opacity: 0.90; font-weight: 600; font-size: 16px; }
      .small { fill: #D1FAE5; opacity: 0.86; font-weight: 560; font-size: 14px; }
      .chip { fill: #0B1120; opacity: 0.75; }
    </style>
  </defs>

  <!-- Base background -->
  <rect width="1600" height="4800" fill="url(#bg)"/>

  <!-- Right-side grid overlay (subtle) -->
  <g opacity="0.9">
    <rect x="860" y="0" width="740" height="4800" fill="url(#grid)"/>
  </g>

  <!-- Soft topographic contours across page -->
  <g opacity="0.10" stroke="#D1FAE5" stroke-width="1">
    <path d="M0 420 C220 340 390 500 610 410 S980 320 1200 460 S1420 560 1600 380"/>
    <path d="M0 760 C240 650 420 830 650 740 S980 640 1200 800 S1420 930 1600 690"/>
    <path d="M0 1200 C230 1100 460 1320 700 1210 S980 1060 1200 1240 S1420 1420 1600 1140"/>
    <path d="M0 1680 C250 1580 480 1800 740 1685 S1040 1500 1240 1720 S1460 1940 1600 1600"/>
    <path d="M0 2180 C260 2060 520 2340 780 2220 S1080 1980 1280 2240 S1460 2500 1600 2060"/>
    <path d="M0 2680 C280 2560 560 2920 820 2720 S1120 2460 1320 2760 S1480 3120 1600 2620"/>
    <path d="M0 3220 C300 3080 600 3520 880 3240 S1180 2920 1360 3300 S1500 3740 1600 3120"/>
    <path d="M0 3720 C300 3560 640 4040 920 3720 S1220 3360 1400 3840 S1520 4380 1600 3600"/>
    <path d="M0 4240 C320 4080 680 4560 980 4240 S1260 3900 1440 4380 S1540 4860 1600 4100"/>
  </g>

  <!-- Vertical signal spine connecting sections -->
  <g id="signal-spine" opacity="0.95">
    <path d="M1400 220 C1330 480 1480 760 1400 1040 C1320 1320 1480 1600 1400 1900 C1320 2200 1480 2520 1400 2860 C1320 3200 1480 3520 1400 3880 C1320 4240 1460 4520 1400 4660" stroke="url(#signal)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M1400 220 C1330 480 1480 760 1400 1040 C1320 1320 1480 1600 1400 1900 C1320 2200 1480 2520 1400 2860 C1320 3200 1480 3520 1400 3880 C1320 4240 1460 4520 1400 4660" stroke="#F59E0B" stroke-width="2" stroke-dasharray="14 18" stroke-linecap="round" opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="0" to="-128" dur="7s" repeatCount="indefinite"/>
    </path>

    <g filter="url(#glow)">
      <circle cx="1400" cy="220" r="8" fill="#22D3EE"/>
      <circle cx="1400" cy="1040" r="9" fill="#F59E0B"/>
      <circle cx="1400" cy="1900" r="9" fill="#22D3EE"/>
      <circle cx="1400" cy="2860" r="9" fill="#F59E0B"/>
      <circle cx="1400" cy="3880" r="9" fill="#22D3EE"/>
      <circle cx="1400" cy="4660" r="9" fill="#F59E0B"/>
    </g>
  </g>

  <!-- 01 / HERO -->
  <g id="hero">
    <rect x="120" y="120" width="1360" height="680" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.35"/>

    <text x="168" y="178" class="mono label">01 / HERO</text>

    <text x="168" y="292" class="sans h1">From messy reality</text>
    <text x="168" y="370" class="sans h1">to useful systems</text>

    <text x="168" y="428" class="sans body">Cognitive Science • Data • Real-world Behaviour</text>

    <path d="M240 520 C420 420 560 620 720 520 C920 390 1040 660 1200 520" stroke="url(#signal)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <path d="M240 520 C420 420 560 620 720 520 C920 390 1040 660 1200 520" stroke="#F59E0B" stroke-width="2" stroke-dasharray="10 14" stroke-linecap="round" opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="0" to="-96" dur="6s" repeatCount="indefinite"/>
    </path>

    <g filter="url(#glow)">
      <circle cx="240" cy="520" r="7" fill="#22D3EE"/>
      <circle cx="720" cy="520" r="7" fill="#22D3EE"/>
      <circle cx="1200" cy="520" r="8" fill="#F59E0B"/>
    </g>

    <!-- meadow-like hills (simple vector shapes) -->
    <g opacity="0.35">
      <path d="M160 740 C300 660 420 690 560 650 C680 615 760 560 900 590 C1040 620 1140 690 1280 650 C1380 620 1450 640 1480 660 L1480 800 L160 800 Z" fill="#064E3B"/>
      <path d="M160 780 C320 710 470 760 610 710 C760 660 860 610 980 640 C1120 670 1230 740 1360 710 C1420 695 1465 700 1480 705 L1480 800 L160 800 Z" fill="#047857" opacity="0.65"/>
    </g>
  </g>

  <!-- 02 / MANIFESTO -->
  <g id="manifesto">
    <rect x="120" y="880" width="1360" height="520" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.35"/>

    <text x="168" y="938" class="mono label">02 / MANIFESTO</text>

    <text x="168" y="1040" class="sans h2">Hi, I’m Niels.</text>
    <text x="168" y="1090" class="sans body">Cognitive Science student building human-centered data systems for messy real-world behaviour.</text>

    <text x="168" y="1160" class="sans small">I’m interested in the moment where the real world becomes structured enough to reason about —</text>
    <text x="168" y="1192" class="sans small">movement, decisions, perception, experiments, environments — and tools that help people act.</text>

    <path d="M168 1260 H1280" stroke="url(#signal)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <g filter="url(#glow)">
      <circle cx="420" cy="1260" r="6" fill="#22D3EE"/>
      <circle cx="720" cy="1260" r="7" fill="#F59E0B"/>
      <circle cx="1040" cy="1260" r="6" fill="#22D3EE"/>
    </g>

    <text x="168" y="1336" class="mono" fill="#D1FAE5" opacity="0.88" font-size="13" font-weight="800" letter-spacing="0.12em">THESIS</text>
    <text x="168" y="1366" class="sans body">I build systems that turn messy real-world behaviour into useful data, models, and tools.</text>
  </g>

  <!-- 03 / HUMAN × MACHINE -->
  <g id="human-machine">
    <rect x="120" y="1480" width="1360" height="600" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.30"/>

    <text x="168" y="1538" class="mono label">03 / HUMAN × MACHINE</text>

    <text x="168" y="1638" class="sans h2">Bridging judgement and scale</text>
    <text x="168" y="1688" class="sans small">The work is not about replacing humans with automation. It’s about designing bridges:</text>

    <rect x="168" y="1740" width="620" height="260" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.25"/>
    <rect x="860" y="1740" width="520" height="260" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.20"/>

    <text x="210" y="1792" class="mono" fill="#22D3EE" font-size="16" font-weight="900" letter-spacing="0.14em">HUMANS</text>
    <text x="900" y="1792" class="mono" fill="#F59E0B" font-size="16" font-weight="900" letter-spacing="0.14em">MACHINES</text>

    <g class="sans" fill="#D1FAE5" opacity="0.9" font-size="15" font-weight="650">
      <text x="210" y="1838">Context</text>
      <text x="210" y="1872">Meaning</text>
      <text x="210" y="1906">Judgement</text>
      <text x="210" y="1940">Creativity</text>
      <text x="210" y="1974">Goals &amp; trade-offs</text>

      <text x="900" y="1838">Scale</text>
      <text x="900" y="1872">Memory</text>
      <text x="900" y="1906">Pattern-finding</text>
      <text x="900" y="1940">Repetition</text>
      <text x="900" y="1974">Computation</text>
    </g>

    <g filter="url(#glow)">
      <circle cx="184" cy="1833" r="5" fill="#22D3EE"/>
      <circle cx="184" cy="1901" r="5" fill="#F59E0B"/>
      <circle cx="184" cy="1969" r="5" fill="#22D3EE"/>

      <circle cx="874" cy="1833" r="5" fill="#F59E0B"/>
      <circle cx="874" cy="1901" r="5" fill="#22D3EE"/>
      <circle cx="874" cy="1969" r="5" fill="#F59E0B"/>
    </g>
  </g>

  <!-- 04 / OBSERVE → MODEL → BUILD -->
  <g id="observe-model-build">
    <rect x="120" y="2160" width="1360" height="680" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.32"/>

    <text x="168" y="2218" class="mono label">04 / OBSERVE → MODEL → BUILD</text>
    <text x="168" y="2318" class="sans h2">A systems spine</text>

    <path d="M260 2410 H1260" stroke="url(#signal)" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <g filter="url(#glow)">
      <circle cx="260" cy="2410" r="7" fill="#22D3EE"/>
      <circle cx="760" cy="2410" r="8" fill="#F59E0B"/>
      <circle cx="1260" cy="2410" r="7" fill="#22D3EE"/>
    </g>

    <rect x="168" y="2480" width="410" height="300" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.22"/>
    <rect x="595" y="2480" width="410" height="300" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="1022" y="2480" width="410" height="300" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.22"/>

    <text x="200" y="2550" class="mono" fill="#22D3EE" font-size="18" font-weight="950" letter-spacing="0.14em">OBSERVE</text>
    <text x="627" y="2550" class="mono" fill="#F59E0B" font-size="18" font-weight="950" letter-spacing="0.14em">MODEL</text>
    <text x="1054" y="2550" class="mono" fill="#22D3EE" font-size="18" font-weight="950" letter-spacing="0.14em">BUILD</text>

    <text x="200" y="2590" class="sans body">Turn behaviour into data</text>
    <text x="627" y="2590" class="sans body">Turn data into structure</text>
    <text x="1054" y="2590" class="sans body">Turn structure into tools</text>

    <g class="sans" fill="#D1FAE5" opacity="0.88" font-size="14" font-weight="620">
      <text x="200" y="2640">Experiments • movement • perception</text>
      <text x="200" y="2670">Field data • instrumentation • signals</text>

      <text x="627" y="2640">Spatial reasoning • cognitive models</text>
      <text x="627" y="2670">Computer vision • geospatial systems</text>

      <text x="1054" y="2640">Interfaces • dashboards • full-stack</text>
      <text x="1054" y="2670">Reproducible research systems</text>
    </g>

    <g opacity="0.25" stroke="#D1FAE5" stroke-width="1">
      <path d="M220 2725 C280 2695 330 2755 390 2725 S490 2710 560 2736"/>
      <path d="M650 2736 C720 2706 790 2760 860 2734 S940 2718 990 2742"/>
      <path d="M1080 2734 C1160 2702 1230 2764 1320 2734 S1390 2716 1400 2738"/>
    </g>
  </g>

  <!-- 05 / TERRAIN -->
  <g id="terrain">
    <rect x="120" y="2920" width="1360" height="640" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>

    <text x="168" y="2978" class="mono label">05 / TERRAIN</text>
    <text x="168" y="3078" class="sans h2">Where I like working</text>

    <rect x="168" y="3150" width="632" height="160" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>
    <rect x="848" y="3150" width="584" height="160" rx="22" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.28"/>
    <rect x="168" y="3330" width="632" height="160" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="848" y="3330" width="584" height="160" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.22"/>

    <g filter="url(#glow)">
      <circle cx="208" cy="3232" r="7" fill="#22D3EE"/>
      <circle cx="888" cy="3232" r="7" fill="#F59E0B"/>
      <circle cx="208" cy="3412" r="7" fill="#F59E0B"/>
      <circle cx="888" cy="3412" r="7" fill="#22D3EE"/>
    </g>

    <text x="238" y="3218" class="sans h3">Experimental systems</text>
    <text x="238" y="3250" class="sans small">Browser-based tasks • cognitive testing • research workflows</text>

    <text x="918" y="3218" class="sans h3">Spatial intelligence</text>
    <text x="918" y="3250" class="sans small">Movement • reachability • geospatial reasoning</text>

    <text x="238" y="3398" class="sans h3">Applied perception</text>
    <text x="238" y="3430" class="sans small">Computer vision • object detection • real-world layouts</text>

    <text x="918" y="3398" class="sans h3">Human-facing tools</text>
    <text x="918" y="3430" class="sans small">Dashboards • visual explanations • full-stack prototypes</text>
  </g>

  <!-- 06 / TOOLBELT -->
  <g id="toolbelt">
    <rect x="120" y="3640" width="1360" height="640" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.26"/>

    <text x="168" y="3698" class="mono label">06 / TOOLBELT</text>
    <text x="168" y="3798" class="sans h2">Map legend</text>

    <rect x="168" y="3870" width="632" height="160" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>
    <rect x="848" y="3870" width="584" height="160" rx="22" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.28"/>
    <rect x="168" y="4050" width="632" height="160" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="848" y="4050" width="584" height="160" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.22"/>

    <g filter="url(#glow)">
      <circle cx="208" cy="3952" r="7" fill="#22D3EE"/>
      <circle cx="888" cy="3952" r="7" fill="#F59E0B"/>
      <circle cx="208" cy="4132" r="7" fill="#F59E0B"/>
      <circle cx="888" cy="4132" r="7" fill="#22D3EE"/>
    </g>

    <text x="238" y="3938" class="sans h3">Analysis &amp; modelling</text>
    <text x="238" y="3970" class="sans small">Python • R • pandas • GeoPandas • PyTorch</text>

    <text x="918" y="3938" class="sans h3">Web systems</text>
    <text x="918" y="3970" class="sans small">TypeScript • React • Next.js • Tailwind</text>

    <text x="238" y="4118" class="sans h3">Data &amp; infrastructure</text>
    <text x="238" y="4150" class="sans small">PostgreSQL • Docker • Prisma • S3-compatible storage</text>

    <text x="918" y="4118" class="sans h3">Design &amp; communication</text>
    <text x="918" y="4150" class="sans small">Markdown • Mermaid • Photoshop</text>
  </g>

  <!-- 07 / PRINCIPLES -->
  <g id="principles">
    <rect x="120" y="4360" width="1360" height="320" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.25"/>

    <text x="168" y="4418" class="mono label">07 / PRINCIPLES</text>

    <text x="168" y="4510" class="sans h2">Design principles</text>

    <path d="M240 4580 H1320" stroke="#D1FAE5" stroke-opacity="0.18" stroke-width="1"/>

    <g filter="url(#glow)">
      <circle cx="280" cy="4580" r="8" fill="#22D3EE"/>
      <circle cx="640" cy="4580" r="8" fill="#F59E0B"/>
      <circle cx="980" cy="4580" r="8" fill="#22D3EE"/>
      <circle cx="1320" cy="4580" r="8" fill="#F59E0B"/>
    </g>

    <g class="sans" fill="#D1FAE5" opacity="0.92" font-size="14" font-weight="700">
      <text x="168" y="4620">Reproducible enough to rerun</text>
      <text x="520" y="4620">Visual enough to explain</text>
      <text x="860" y="4620">Modular enough to grow</text>
      <text x="1190" y="4620">Practical enough to use</text>
    </g>
  </g>

  <!-- 08 / CLOSING -->
  <g id="footer">
    <text x="120" y="4750" class="mono label">08 / CLOSING</text>
    <text x="120" y="4788" class="sans" fill="#D1FAE5" opacity="0.92" font-size="18" font-weight="750">
      Building systems that help people observe, model, and understand decisions in the wild.
    </text>

    <g opacity="0.38">
      <path d="M0 4800 C260 4640 520 4720 780 4620 C980 4545 1160 4560 1340 4620 C1480 4665 1560 4680 1600 4660 L1600 4800 Z" fill="#064E3B"/>
      <path d="M0 4800 C300 4720 560 4800 820 4720 C1040 4650 1230 4660 1400 4720 C1520 4760 1580 4770 1600 4760 L1600 4800 Z" fill="#047857" opacity="0.62"/>
    </g>
  </g>
</svg>
