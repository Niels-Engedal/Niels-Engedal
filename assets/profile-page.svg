<svg width="1600" height="3600" viewBox="0 0 1600 3600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Niels Engedal — From messy reality to useful systems</title>
  <desc id="desc">A single continuous profile page. Sections: hero, manifesto, human × machine philosophy, observe model build spine, terrain, toolbelt, design principles, closing line.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="3600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="0.22" stop-color="#064E3B"/>
      <stop offset="0.58" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0.86"/>
    </linearGradient>

    <linearGradient id="signal" x1="240" y1="0" x2="1360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#047857" stop-opacity="0.25"/>
      <stop offset="0.55" stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.9"/>
    </linearGradient>

    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="#22D3EE" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .label { fill: #D1FAE5; opacity: 0.92; font-weight: 850; letter-spacing: 0.16em; font-size: 24px; }
      .h1 { fill: #D1FAE5; font-weight: 920; font-size: 112px; }
      .h2 { fill: #D1FAE5; font-weight: 880; font-size: 64px; }
      .h3 { fill: #D1FAE5; font-weight: 860; font-size: 44px; }
      .body { fill: #D1FAE5; opacity: 0.92; font-weight: 620; font-size: 34px; }
      .small { fill: #D1FAE5; opacity: 0.88; font-weight: 580; font-size: 28px; }
      .chip { fill: #0B1120; opacity: 0.75; }
    </style>
  </defs>

  <!-- Base background -->
  <rect width="1600" height="3600" fill="url(#bg)"/>

  <!-- Right-side grid overlay (subtle) -->
  <g opacity="0.9">
    <rect x="860" y="0" width="740" height="3600" fill="url(#grid)"/>
  </g>

  <!-- Soft topographic contours across page -->
  <g opacity="0.10" stroke="#D1FAE5" stroke-width="1">
    <path d="M0 420 C220 340 390 500 610 410 S980 320 1200 460 S1420 560 1600 380"/>
    <path d="M0 760 C240 650 420 830 650 740 S980 640 1200 800 S1420 930 1600 690"/>
    <path d="M0 1200 C230 1100 460 1320 700 1210 S980 1060 1200 1240 S1420 1420 1600 1140"/>
    <path d="M0 1680 C250 1580 480 1800 740 1685 S1040 1500 1240 1720 S1460 1940 1600 1600"/>
    <path d="M0 2180 C260 2060 520 2340 780 2220 S1080 1980 1280 2240 S1460 2500 1600 2060"/>
    <path d="M0 2680 C280 2560 560 2920 820 2720 S1120 2460 1320 2760 S1480 3120 1600 2620"/>
    <path d="M0 3220 C300 3080 600 3520 880 3240 S1180 2920 1360 3300 S1500 3740 1600 3120"/>
  </g>

  <!-- Vertical signal spine connecting sections -->
  <g id="signal-spine" opacity="0.95">
    <path d="M1400 220 C1330 410 1480 614 1400 819 C1320 1023 1480 1227 1400 1446 C1320 1665 1480 1899 1400 2147 C1320 2395 1480 2629 1400 2892 C1320 3155 1460 3359 1400 3461" stroke="url(#signal)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M1400 220 C1330 410 1480 614 1400 819 C1320 1023 1480 1227 1400 1446 C1320 1665 1480 1899 1400 2147 C1320 2395 1480 2629 1400 2892 C1320 3155 1460 3359 1400 3461" stroke="#F59E0B" stroke-width="2" stroke-dasharray="14 18" stroke-linecap="round" opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="0" to="-128" dur="7s" repeatCount="indefinite"/>
    </path>

    <g filter="url(#glow)">
      <circle cx="1400" cy="220" r="8" fill="#22D3EE"/>
      <circle cx="1400" cy="819" r="9" fill="#F59E0B"/>
      <circle cx="1400" cy="1446" r="9" fill="#22D3EE"/>
      <circle cx="1400" cy="2147" r="9" fill="#F59E0B"/>
      <circle cx="1400" cy="2892" r="9" fill="#22D3EE"/>
      <circle cx="1400" cy="3461" r="9" fill="#F59E0B"/>
    </g>
  </g>

  <!-- 01 / HERO -->
  <g id="hero">
    <rect x="120" y="80" width="1360" height="620" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.35"/>

    <text x="168" y="142" class="mono label">01 / HERO</text>

    <text x="168" y="270" class="sans h1">From messy reality</text>
    <text x="168" y="392" class="sans h1">to useful systems</text>

    <text x="168" y="472" class="sans body">Cognitive Science • Data • Real-world Behaviour</text>

    <path d="M240 550 C420 450 560 650 720 550 C920 420 1040 690 1200 550" stroke="url(#signal)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <path d="M240 550 C420 450 560 650 720 550 C920 420 1040 690 1200 550" stroke="#F59E0B" stroke-width="2" stroke-dasharray="10 14" stroke-linecap="round" opacity="0.35">
      <animate attributeName="stroke-dashoffset" from="0" to="-96" dur="6s" repeatCount="indefinite"/>
    </path>

    <g filter="url(#glow)">
      <circle cx="240" cy="550" r="7" fill="#22D3EE"/>
      <circle cx="720" cy="550" r="7" fill="#22D3EE"/>
      <circle cx="1200" cy="550" r="8" fill="#F59E0B"/>
    </g>

    <!-- meadow-like hills (simple vector shapes) -->
    <g opacity="0.35">
      <path d="M160 640 C300 560 420 590 560 550 C680 515 760 460 900 490 C1040 520 1140 590 1280 550 C1380 520 1450 540 1480 560 L1480 700 L160 700 Z" fill="#064E3B"/>
      <path d="M160 675 C320 605 470 655 610 605 C760 555 860 505 980 535 C1120 565 1230 635 1360 605 C1420 590 1465 595 1480 600 L1480 700 L160 700 Z" fill="#047857" opacity="0.65"/>
    </g>
  </g>

  <!-- 02 / MANIFESTO -->
  <g id="manifesto">
    <rect x="120" y="740" width="1360" height="430" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.35"/>

    <text x="168" y="800" class="mono label">02 / MANIFESTO</text>

    <text x="168" y="905" class="sans h2">Hi, I’m Niels.</text>
    <text x="168" y="972" class="sans body">Cognitive Science student building human-centered data systems for messy real-world behaviour.</text>

    <text x="168" y="1038" class="sans small">Movement, decisions, perception, experiments, environments — and tools that help people act.</text>

    <path d="M168 1085 H1280" stroke="url(#signal)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <g filter="url(#glow)">
      <circle cx="420" cy="1085" r="6" fill="#22D3EE"/>
      <circle cx="720" cy="1085" r="7" fill="#F59E0B"/>
      <circle cx="1040" cy="1085" r="6" fill="#22D3EE"/>
    </g>

    <text x="168" y="1120" class="mono" fill="#D1FAE5" opacity="0.88" font-size="24" font-weight="900" letter-spacing="0.14em">THESIS</text>
    <text x="168" y="1165" class="sans body">I build systems that turn messy real-world behaviour into useful data, models, and tools.</text>
  </g>

  <!-- 03 / HUMAN × MACHINE -->
  <g id="human-machine">
    <rect x="120" y="1190" width="1360" height="520" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.30"/>

    <text x="168" y="1248" class="mono label">03 / HUMAN × MACHINE</text>

    <text x="168" y="1352" class="sans h2">Bridging judgement and scale</text>
    <text x="168" y="1418" class="sans small">Not replacing humans with automation — designing bridges:</text>

    <rect x="168" y="1450" width="620" height="260" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.25"/>
    <rect x="860" y="1450" width="520" height="260" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.20"/>

    <text x="210" y="1504" class="mono" fill="#22D3EE" font-size="26" font-weight="950" letter-spacing="0.14em">HUMANS</text>
    <text x="900" y="1504" class="mono" fill="#F59E0B" font-size="26" font-weight="950" letter-spacing="0.14em">MACHINES</text>

    <g class="sans" fill="#D1FAE5" opacity="0.9" font-size="26" font-weight="660">
      <text x="210" y="1558">Context</text>
      <text x="210" y="1594">Meaning</text>
      <text x="210" y="1630">Judgement</text>
      <text x="210" y="1666">Creativity</text>
      <text x="210" y="1702">Goals &amp; trade-offs</text>

      <text x="900" y="1558">Scale</text>
      <text x="900" y="1594">Memory</text>
      <text x="900" y="1630">Pattern-finding</text>
      <text x="900" y="1666">Repetition</text>
      <text x="900" y="1702">Computation</text>
    </g>

    <g filter="url(#glow)">
      <circle cx="184" cy="1552" r="5" fill="#22D3EE"/>
      <circle cx="184" cy="1624" r="5" fill="#F59E0B"/>
      <circle cx="184" cy="1696" r="5" fill="#22D3EE"/>

      <circle cx="874" cy="1552" r="5" fill="#F59E0B"/>
      <circle cx="874" cy="1624" r="5" fill="#22D3EE"/>
      <circle cx="874" cy="1696" r="5" fill="#F59E0B"/>
    </g>
  </g>

  <!-- 04 / OBSERVE → MODEL → BUILD -->
  <g id="observe-model-build">
    <rect x="120" y="1710" width="1360" height="600" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.32"/>

    <text x="168" y="1768" class="mono label">04 / OBSERVE → MODEL → BUILD</text>
    <text x="168" y="1880" class="sans h2">A systems spine</text>

    <path d="M260 1960 H1260" stroke="url(#signal)" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <g filter="url(#glow)">
      <circle cx="260" cy="1960" r="7" fill="#22D3EE"/>
      <circle cx="760" cy="1960" r="8" fill="#F59E0B"/>
      <circle cx="1260" cy="1960" r="7" fill="#22D3EE"/>
    </g>

    <rect x="168" y="2030" width="410" height="260" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.22"/>
    <rect x="595" y="2030" width="410" height="260" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="1022" y="2030" width="410" height="260" rx="22" fill="url(#panel)" stroke="#22D3EE" stroke-opacity="0.22"/>

    <text x="200" y="2100" class="mono" fill="#22D3EE" font-size="28" font-weight="950" letter-spacing="0.14em">OBSERVE</text>
    <text x="627" y="2100" class="mono" fill="#F59E0B" font-size="28" font-weight="950" letter-spacing="0.14em">MODEL</text>
    <text x="1054" y="2100" class="mono" fill="#22D3EE" font-size="28" font-weight="950" letter-spacing="0.14em">BUILD</text>

    <text x="200" y="2140" class="sans body">Turn behaviour into data</text>
    <text x="627" y="2140" class="sans body">Turn data into structure</text>
    <text x="1054" y="2140" class="sans body">Turn structure into tools</text>

    <g class="sans" fill="#D1FAE5" opacity="0.88" font-size="26" font-weight="640">
      <text x="200" y="2190">Experiments • movement • perception</text>
      <text x="200" y="2230">Field data • instrumentation • signals</text>

      <text x="627" y="2190">Spatial reasoning • cognitive models</text>
      <text x="627" y="2230">Computer vision • geospatial systems</text>

      <text x="1054" y="2190">Interfaces • dashboards • full-stack</text>
      <text x="1054" y="2230">Reproducible research systems</text>
    </g>

    <g opacity="0.25" stroke="#D1FAE5" stroke-width="1">
      <path d="M220 2275 C280 2245 330 2305 390 2275 S490 2260 560 2286"/>
      <path d="M650 2286 C720 2256 790 2310 860 2284 S940 2268 990 2292"/>
      <path d="M1080 2284 C1160 2252 1230 2314 1320 2284 S1390 2266 1400 2288"/>
    </g>
  </g>

  <!-- 05 / TERRAIN -->
  <g id="terrain">
    <rect x="120" y="2310" width="1360" height="480" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>

    <text x="168" y="2368" class="mono label">05 / TERRAIN</text>
    <text x="168" y="2480" class="sans h2">Where I like working</text>

    <rect x="168" y="2525" width="632" height="120" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>
    <rect x="848" y="2525" width="584" height="120" rx="22" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.28"/>
    <rect x="168" y="2675" width="632" height="120" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="848" y="2675" width="584" height="120" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.22"/>

    <g filter="url(#glow)">
      <circle cx="208" cy="2585" r="7" fill="#22D3EE"/>
      <circle cx="888" cy="2585" r="7" fill="#F59E0B"/>
      <circle cx="208" cy="2735" r="7" fill="#F59E0B"/>
      <circle cx="888" cy="2735" r="7" fill="#22D3EE"/>
    </g>

    <text x="238" y="2575" class="sans h3">Experimental systems</text>
    <text x="238" y="2610" class="sans small">Browser-based tasks • cognitive testing • research workflows</text>

    <text x="918" y="2575" class="sans h3">Spatial intelligence</text>
    <text x="918" y="2610" class="sans small">Movement • reachability • geospatial reasoning</text>

    <text x="238" y="2725" class="sans h3">Applied perception</text>
    <text x="238" y="2760" class="sans small">Computer vision • object detection • real-world layouts</text>

    <text x="918" y="2725" class="sans h3">Human-facing tools</text>
    <text x="918" y="2760" class="sans small">Dashboards • visual explanations • full-stack prototypes</text>
  </g>

  <!-- 06 / TOOLBELT -->
  <g id="toolbelt">
    <rect x="120" y="2790" width="1360" height="420" rx="28" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.26"/>

    <text x="168" y="2848" class="mono label">06 / TOOLBELT</text>
    <text x="168" y="2940" class="sans h2">Map legend</text>

    <rect x="168" y="2975" width="632" height="105" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.28"/>
    <rect x="848" y="2975" width="584" height="105" rx="22" fill="url(#panel)" stroke="#0891B2" stroke-opacity="0.28"/>
    <rect x="168" y="3090" width="632" height="105" rx="22" fill="url(#panel)" stroke="#F59E0B" stroke-opacity="0.18"/>
    <rect x="848" y="3090" width="584" height="105" rx="22" fill="url(#panel)" stroke="#047857" stroke-opacity="0.22"/>

    <g filter="url(#glow)">
      <circle cx="208" cy="3028" r="7" fill="#22D3EE"/>
      <circle cx="888" cy="3028" r="7" fill="#F59E0B"/>
      <circle cx="208" cy="3143" r="7" fill="#F59E0B"/>
      <circle cx="888" cy="3143" r="7" fill="#22D3EE"/>
    </g>

    <text x="238" y="3035" class="sans h3">Analysis &amp; modelling</text>
    <text x="238" y="3070" class="sans small">Python • R • pandas • GeoPandas • PyTorch</text>

    <text x="918" y="3035" class="sans h3">Web systems</text>
    <text x="918" y="3070" class="sans small">TypeScript • React • Next.js • Tailwind</text>

    <text x="238" y="3150" class="sans h3">Data &amp; infrastructure</text>
    <text x="238" y="3185" class="sans small">PostgreSQL • Docker • Prisma • S3-compatible storage</text>

    <text x="918" y="3150" class="sans h3">Design &amp; communication</text>
    <text x="918" y="3185" class="sans small">Markdown • Mermaid • Photoshop</text>
  </g>

  <!-- 07 / PRINCIPLES -->
  <g id="principles">
    <rect x="120" y="3230" width="1360" height="280" rx="28" fill="url(#panel)" stroke="#047857" stroke-opacity="0.25"/>

    <text x="168" y="3288" class="mono label">07 / PRINCIPLES</text>

    <text x="168" y="3366" class="sans h3">Design principles</text>

    <path d="M240 3398 H1320" stroke="#D1FAE5" stroke-opacity="0.18" stroke-width="1"/>

    <g filter="url(#glow)">
      <circle cx="280" cy="3398" r="8" fill="#22D3EE"/>
      <circle cx="640" cy="3398" r="8" fill="#F59E0B"/>
      <circle cx="980" cy="3398" r="8" fill="#22D3EE"/>
      <circle cx="1320" cy="3398" r="8" fill="#F59E0B"/>
    </g>

    <g class="sans" fill="#D1FAE5" opacity="0.92" font-size="26" font-weight="720">
      <text x="168" y="3450">Reproducible enough to rerun</text>
      <text x="860" y="3450">Visual enough to explain</text>
      <text x="168" y="3488">Modular enough to grow</text>
      <text x="860" y="3488">Practical enough to use</text>
    </g>
  </g>

  <!-- 08 / CLOSING -->
  <g id="footer">
    <g opacity="0.38">
      <path d="M0 3600 C260 3548 520 3582 780 3550 C980 3528 1160 3536 1340 3550 C1480 3566 1560 3574 1600 3562 L1600 3600 Z" fill="#064E3B"/>
      <path d="M0 3600 C300 3576 560 3600 820 3576 C1040 3556 1230 3560 1400 3576 C1520 3590 1580 3594 1600 3590 L1600 3600 Z" fill="#047857" opacity="0.62"/>
    </g>

    <text x="120" y="3542" class="mono label">08 / CLOSING</text>
    <text x="120" y="3584" class="sans" fill="#D1FAE5" opacity="0.92" font-size="34" font-weight="760">
      Building systems that help people observe, model, and understand decisions in the wild.
    </text>
  </g>
</svg>
